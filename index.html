<!doctype html>
<html>
  <head>
    <style>
      body { background: #222; color: #0f0; font-family: monospace; }
      #output { width: 100%; height: 300px; background: #000; color: #0f0; }
      #input { width: 100%; padding: 10px; box-sizing: border-box; background: #333; color: #fff; border: 1px solid #555; }
    </style>
  </head>
  <body>
    <textarea id="output" readonly></textarea>
    <input type="text" id="input" placeholder="Enter choice here..." autofocus>
    <script async type="text/javascript" src="index.js"></script> <script>
      var inputElement = document.getElementById('input');
      var outputElement = document.getElementById('output');
      
      inputElement.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          const text = inputElement.value + '\n';
          // This pushes the text into the Emscripten filesystem's stdin
          Module.stdinPush(text);
          inputElement.value = '';
        }
      });

      var Module = {
        stdinBuffer: [],
        stdinPush: function(str) {
          for (var i = 0; i < str.length; i++) {
            this.stdinBuffer.push(str.charCodeAt(i));
          }
        },
        print: function(text) {
          outputElement.value += text + '\n';
          outputElement.scrollTop = outputElement.scrollHeight;
        },
        preRun: [function() {
          // Tell Emscripten to read from our stdinBuffer
          FS.init(function() {
            return Module.stdinBuffer.shift() || null;
          }, null, null);
        }]
      };
    </script>
  </body>
</html>
